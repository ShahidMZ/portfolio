<section class="hero min-h-screen bg-base-200 relative overflow-hidden background" id="home">
    <video id="video" loop muted playsinline autoplay>
        <source src="video/bg1.mp4" type="video/mp4">
    </video>
    <!-- Decorative background blur -->
    <!-- <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/20 rounded-full blur-[100px]"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-secondary/20 rounded-full blur-[100px]"></div> -->
    <div class="overlay w-full h-full custom-hero-content text-center font-sans z-10">
        <div class="max-w-3xl" appScrollAnimation [hiddenClass]="'opacity-0 translate-y-20 scale-90'"
            [animationClass]="'opacity-100 translate-y-0 scale-100'">
            <h1
                class="text-6xl md:text-8xl font-black mb-6 bg-clip-text text-transparent bg-linear-to-r from-primary to-secondary leading-tight tracking-tight">
                Hi, I'm <br />Shahid M Zubair.
            </h1>
            <p class="py-6 text-xl md:text-2xl opacity-80 font-light mb-8 max-w-2xl mx-auto leading-relaxed">
                I craft stunning Web Apps with Angular, React and .NET. <br/>Welcome to my portfolio.
            </p>
            <div class="flex gap-4 justify-center" appScrollAnimation [hiddenClass]="'opacity-0 translate-y-10'"
                [animationClass]="'opacity-100 translate-y-0'" [threshold]="0">
                <a href="#experience"
                    class="btn btn-primary btn-lg rounded-full shadow-lg shadow-primary/30 hover:scale-105 transition-transform duration-300">Explore
                    My Work</a>
                <a href="#contact"
                    class="btn btn-outline btn-secondary btn-lg rounded-full hover:scale-105 transition-transform duration-300">Get
                    in Touch</a>
            </div>
        </div>

        <!-- Scroll Indicator -->
        <div class="absolute bottom-10 left-1/2 -translate-x-1/2 animate-bounce opacity-60 cursor-pointer">
            <a href="#experience">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M19 14l-7 7m0 0l-7-7m7 7V3" />
                </svg>
            </a>
        </div>
    </div>
</section>
