<section class="py-32 px-6 md:px-12 bg-base-100 background" id="contact">
    <div class="max-w-4xl mx-auto">
        <div class="text-center mb-16 cursor-default" appScrollAnimation [hiddenClass]="'opacity-0 translate-y-10'" [animationClass]="'opacity-100 translate-y-0'">
            <h2 class="text-4xl md:text-5xl font-bold mb-4 font-sans tracking-tight">Let's Connect</h2>
            <div class="h-1 w-24 bg-accent mx-auto rounded-full"></div>
            <p class="mt-6 text-xl opacity-80">
                Have a project in mind or just want to say hi? Drop me a message!
            </p>
        </div>
        <div class="card lg:card-side bg-base-200 customShadow overflow-hidden" appScrollAnimation
            [hiddenClass]="'opacity-0 scale-95'" [animationClass]="'opacity-100 scale-100'">
            <!-- Contact Info Side -->
            <div class="bg-primary text-primary-content p-10 lg:w-1/2 flex flex-col 
                justify-center cursor-default info-background">
                <h3 class="text-2xl font-bold mb-6">Contact Information</h3>
                <div class="space-y-6">
                    <div class="flex items-center gap-4">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                        </svg>
                        <span>{{ emailID() }}</span>
                    </div>
                    <!-- <div class="flex items-center gap-4">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
                        </svg>
                        <span>+1 (555) 123-4567</span>
                    </div> -->
                    <div class="flex items-center gap-4">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                        </svg>
                        <span>{{ address() }}</span>
                    </div>
                </div>
            </div>
            <!-- Form Side -->
            <div class="card-body lg:w-2/3 p-10">
                <form id="emailForm" name="emailForm" class="space-y-6" #emailForm="ngForm">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="form-control w-full">
                            <label class="label m-1"><span class="label-text font-semibold">Your Name</span></label>
                            <input type="text" placeholder="John Doe" class="input input-bordered w-full focus:input-primary transition-colors" />
                        </div>
                        <div class="form-control w-full">
                            <label class="label m-1"><span class="label-text font-semibold">Email Address</span></label>
                            <input type="email" placeholder="john@example.com" class="input input-bordered w-full focus:input-primary transition-colors" />
                        </div>
                    </div>
                    <div class="form-control w-full">
                        <label class="label m-1"><span class="label-text font-semibold">Subject</span></label>
                        <input id="subject" type="text" placeholder="Project Inquiry" [(ngModel)]="subject" name="subject"
                            class="input input-bordered w-full focus:input-primary transition-colors" />
                    </div>
                    <div class="form-control w-full">
                        <label class="label m-1"><span class="label-text font-semibold">Message</span></label>
                        <textarea id="message" [(ngModel)]="message" name="message"
                            class="textarea textarea-bordered h-32 focus:textarea-primary transition-colors w-full"
                            placeholder="Hello there!"></textarea>
                    </div>
                    <button id="sendButton" class="btn btn-primary w-full shadow-lg hover:shadow-xl transition-all" (click)="sendEmail()">
                        Send Messages
                    </button>
                </form>
            </div>
        </div>
    </div>
</section>
